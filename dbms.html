<!DOCTYPE html>
<html>
<head>
<title>DBMS Course</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial,sans-serif;
text-align:center;
margin:0;
}

h1{
background:#111827;
padding:20px;
color:#00ffcc;
margin:0;
}

.card{
background:#1e293b;
margin:20px;
padding:20px;
border-radius:10px;
}

button{
background:#00ffcc;
color:black;
border:none;
padding:12px 20px;
border-radius:8px;
font-size:16px;
margin:8px;
cursor:pointer;
}

pre{
background:#111827;
color:#00ffcc;
padding:15px;
border-radius:8px;
text-align:left;
overflow:auto;
}
</style>

</head>

<body>

<h1>🗄️ DBMS Course</h1>

<div class="card">

<h2>Learn DBMS</h2>

<button onclick="watchVideo()">🎥 Watch DBMS Video</button>

<button onclick="showNotes()">📖 Show Notes</button>

<p id="notes"></p>

</div>

<div class="card">

<h2>📝 Quiz</h2>

<p>DBMS stands for?</p>

<input type="radio" name="q1" onclick="correct()">
Database Management System
<br><br>

<input type="radio" name="q1" onclick="wrong()">
Data Backup Management System
<br><br>

<input type="radio" name="q1" onclick="wrong()">
Digital Base Memory System
<br><br>

<p id="result"></p>

</div>

<div class="card">

<h2>💡 Example</h2>

<pre>
Popular DBMS:
• MySQL
• Oracle
• PostgreSQL
• SQL Server
</pre>

</div>

<div class="card">
<a href="courses.html">
<button>⬅ Back to Courses</button>
</a>
</div>

<script>

function watchVideo(){
window.open("https://www.youtube.com/results?search_query=DBMS+Full+Course");
}

function showNotes(){
document.getElementById("notes").innerHTML=
"DBMS (Database Management System) is software used to create, store, organize and manage data efficiently.";
}

function correct(){
document.getElementById("result").innerHTML="✅ Correct Answer!";
}

function wrong(){
document.getElementById("result").innerHTML="❌ Wrong Answer!";
}

</script>

</body>
</html>
