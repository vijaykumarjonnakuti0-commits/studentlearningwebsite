<!DOCTYPE html>
<html>
<head>
<title>CSS Course</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial,sans-serif;
text-align:center;
margin:0;
}

h1{
background:#111827;
padding:20px;
color:#00ffcc;
margin:0;
}

.card{
background:#1e293b;
margin:20px;
padding:20px;
border-radius:10px;
}

button{
background:#00ffcc;
color:black;
border:none;
padding:12px 20px;
border-radius:8px;
font-size:16px;
margin:8px;
cursor:pointer;
}

pre{
background:#111827;
color:#00ffcc;
padding:15px;
border-radius:8px;
text-align:left;
overflow:auto;
}
</style>

</head>

<body>

<h1>🎨 CSS Course</h1>

<div class="card">

<h2>Learn CSS</h2>

<button onclick="watchVideo()">🎥 Watch CSS Video</button>

<button onclick="showAnswer()">📖 Show Notes</button>

<p id="answer"></p>

</div>

<div class="card">

<h2>📝 CSS Quiz</h2>

<p>CSS యొక్క Full Form ఏమిటి?</p>

<input type="radio" name="q1" onclick="wrong()">
Creative Style Sheets
<br><br>

<input type="radio" name="q1" onclick="correct()">
Cascading Style Sheets
<br><br>

<input type="radio" name="q1" onclick="wrong()">
Computer Style System
<br><br>

<p id="result"></p>

</div>

<div class="card">

<h2>💻 Practice Example</h2>

<pre>
h1{
 color:red;
 text-align:center;
}
</pre>

</div>

<div class="card">

<a href="courses.html">
<button>⬅ Back to Courses</button>
</a>

</div>

<script>

function watchVideo(){
window.open("https://www.youtube.com/results?search_query=CSS+Full+Course");
}

function showAnswer(){
document.getElementById("answer").innerHTML=
"<b>CSS</b> stands for <b>Cascading Style Sheets</b>.<br><br>CSS is used to design web pages by adding colors, fonts, spacing, layouts and animations.";
}

function correct(){
document.getElementById("result").innerHTML="✅ Correct Answer!";
}

function wrong(){
document.getElementById("result").innerHTML="❌ Wrong Answer!";
}

</script>

</body>
</html>
