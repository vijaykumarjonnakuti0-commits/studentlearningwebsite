<!DOCTYPE html>
<html>
<head>
<title>Certificate</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.certificate{
background:white;
color:black;
padding:40px;
width:80%;
max-width:700px;
text-align:center;
border:8px solid gold;
border-radius:15px;
}

h1{
color:darkblue;
}

h2{
color:green;
}

button{
margin-top:20px;
padding:12px 20px;
background:#00cc66;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="certificate">

<h1>🏆 Certificate of Completion</h1>

<h2>Vijay Learning Hub</h2>

<p>This Certificate is proudly presented to</p>

<h2 id="studentName">Vijay Kumar</h2>

<p>for successfully completing the course.</p>

<p id="date"></p>

<button onclick="window.print()">🖨️ Print Certificate</button>

<br><br>

<a href="dashboard.html">⬅ Back to Dashboard</a>

</div>

<script>
let today = new Date();
document.getElementById("date").innerHTML =
"Date: " + today.toLocaleDateString();
</script>

</body>
</html>
