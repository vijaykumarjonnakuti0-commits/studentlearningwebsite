<!DOCTYPE html>
<html>
<head>
<title>Certificate</title>

<style>
body{
    background:#f2f2f2;
    font-family:Arial, sans-serif;
    text-align:center;
}

.certificate{
    width:800px;
    min-height:550px;
    background:white;
    margin:40px auto;
    padding:30px;
    border:10px solid #333;
    box-shadow:0 0 15px gray;
}

h1{
    font-size:40px;
}

.name{
    font-size:32px;
    font-weight:bold;
}

.signature{
    margin-top:40px;
}

.signature img{
    width:120px;
}

input{
    padding:10px;
    font-size:16px;
}

button{
    padding:10px 20px;
    font-size:16px;
    cursor:pointer;
}

</style>

</head>

<body>

<div class="certificate">

<h1>🏆 Certificate of Completion</h1>

<h2>This Certificate is Awarded to</h2>

<h1 class="name" id="studentName">Student Name</h1>

<p>For Successfully Completing the</p>

<h2>HTML Course</h2>

<p>Issued by <b>Learn With Vijay</b></p>

<h3>Certificate ID: LWV-2026-0001</h3>

<p>Status: ✅ Verified</p>


<div class="signature">

<p>Authorized By</p>

<img src="images/signature.png">

<p><b>Vijay Babu</b></p>

<p>Founder, Learn With Vijay</p>

</div>

</div>


<h3>This Certificate is Presented to</h3>

<input type="text" id="name" placeholder="Enter Your Name">

<br><br>

<button onclick="showCertificate()">Generate Certificate</button>

<br><br>

<button onclick="window.print()">🖨️ Download / Print Certificate</button>


<script>

function showCertificate(){

let name = document.getElementById("name").value;

document.getElementById("studentName").innerHTML = name;

}

</script>


</body>
</html>
