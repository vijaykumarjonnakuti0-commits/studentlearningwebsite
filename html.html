<!DOCTYPE html>
<html>
<head>
<title>HTML Course</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial,sans-serif;
text-align:center;
margin:0;
}

h1{
background:#111827;
padding:20px;
color:#00ffcc;
margin:0;
}

.card{
background:#1e293b;
margin:20px;
padding:20px;
border-radius:10px;
}

button{
background:#00ffcc;
color:black;
border:none;
padding:12px 20px;
border-radius:8px;
font-size:16px;
margin:8px;
cursor:pointer;
}
</style>

</head>
<body>

<h1>📘 HTML Course</h1>

<div class="card">
<h2>Learn HTML</h2>

<button onclick="watchVideo()">🎥 Watch HTML Video</button>

<button onclick="showAnswer()">📖 Show Answer</button>

<p id="answer"></p>

</div>

<script>

function watchVideo(){
window.open("https://www.youtube.com/results?search_query=HTML+Full+Course");
}

function showAnswer(){
document.getElementById("answer").innerHTML=
"<b>HTML</b> stands for <b>HyperText Markup Language</b>.<br><br>HTML is used to create the structure of web pages using tags like &lt;html&gt;, &lt;head&gt;, &lt;body&gt;, &lt;h1&gt;, &lt;p&gt; and more.";
}
function correct(){
document.getElementById("result").innerHTML =
"✅ Correct! HTML = HyperText Markup Language";
}

function wrong(){
document.getElementById("result").innerHTML =
"❌ Wrong Answer. Try Again!";
}
</script>
<hr>

<h2>📝 HTML Quiz</h2>

<p><b>1. HTML Full Form ఏమిటి?</b></p>

<input type="radio" name="q1" onclick="wrong()">
Hyper Text Making Language
<br><br>

<input type="radio" name="q1" onclick="correct()">
HyperText Markup Language
<br><br>

<input type="radio" name="q1" onclick="wrong()">
High Text Machine Language
<br><br>

<p id="result"></p>
<script src="script.js"></script>

</body>
</html>
<link rel="stylesheet" href="style.css">
